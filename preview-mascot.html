<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KakuMascot Preview v2</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #F7F3EE;
    font-family: -apple-system, 'Hiragino Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── Hero section ── */
  .hero {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 24px 48px;
    text-align: center;
    gap: 0;
  }
  .label {
    color: #9f1239;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .mascot-wrap {
    margin-bottom: 24px;
    filter: drop-shadow(0 12px 24px rgba(180,120,80,0.18));
  }
  h1 {
    font-size: 2.6rem;
    font-weight: 800;
    color: #1c1917;
    margin: 0 0 16px;
    line-height: 1.35;
  }
  p.desc {
    color: #57534e;
    font-size: 1.05rem;
    max-width: 480px;
    line-height: 1.8;
    margin: 0 0 32px;
  }
  .btns {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn-primary {
    background: #be123c;
    color: white;
    padding: 13px 34px;
    border-radius: 9999px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    box-shadow: 0 4px 16px rgba(190,18,60,0.3);
  }
  .btn-secondary {
    background: white;
    color: #44403c;
    padding: 13px 34px;
    border-radius: 9999px;
    font-weight: 600;
    border: 1.5px solid #d6d3d1;
    cursor: pointer;
    font-size: 1rem;
  }

  /* ── Compare section ── */
  .compare {
    display: flex;
    gap: 48px;
    align-items: flex-end;
    background: white;
    padding: 36px 48px;
    border-radius: 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    margin: 40px;
  }
  .box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .box span {
    font-size: 0.78rem;
    color: #78716c;
    font-weight: 500;
  }
  .tag-new {
    background: #fce7f3;
    color: #9d174d;
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 99px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<!-- ════════ HERO PREVIEW ════════ -->
<div class="hero">
  <p class="label">Anonymous Pen-Pal Service</p>

  <div class="mascot-wrap">

      <!-- ── ARMS (raised "yay!" pose) ── -->

      <ellipse cx="33" cy="79" rx="13" ry="24" fill="#FFFAF3" transform="rotate(-48,33,79)"/>

      <!-- Right arm shadow -->

      <!-- Right arm -->
      <ellipse cx="187" cy="79" rx="13" ry="24" fill="#FFFAF3" transform="rotate(48,187,79)"/>

      <!-- ── CHARACTER BODY ── -->

      <!-- Body main -->
      <rect x="58" y="25" width="102" height="130" rx="24" fill="#FFFAF3"/>

      <!-- Letter lines -->

      <rect x="76" y="63" width="44" height="9" rx="4.5" fill="#DDD0BC"/>

      <!-- ── FACE ── -->
      <!-- Rosy cheeks -->
      <ellipse cx="78" cy="110" rx="15" ry="10" fill="#FF9080" opacity="0.38"/>
      <ellipse cx="140" cy="110" rx="15" ry="10" fill="#FF9080" opacity="0.38"/>

      <!-- Left eye -->
      <circle cx="90" cy="93" r="11" fill="#1A1A1A"/>
      <circle cx="94"  cy="88.5" r="4"   fill="white"/>
      <circle cx="92"  cy="98"   r="2"   fill="white"/>

      <!-- Right eye -->

      <circle cx="132" cy="88.5" r="4"   fill="white"/>
      <circle cx="130" cy="98"   r="2"   fill="white"/>

      <!-- Smile -->
      <path d="M87,114 Q109,130 131,114"
            stroke="#1A1A1A" fill="none" stroke-width="3.2" stroke-linecap="round"/>

      <!-- Red logo dot -->
      <circle cx="137" cy="104" r="7" fill="#C84E3B"/>

      <!-- ── SPARKLES ── -->
      <!-- Star top-left -->
      <path d="M26,40 L28,32 L30,40 L38,42 L30,44 L28,52 L26,44 L18,42 Z"
            fill="#FBBF24" opacity="0.92"/>
      <!-- Star top-right -->
      <path d="M188,24 L190,17 L192,24 L199,26 L192,28 L190,35 L188,28 L181,26 Z"
            fill="#FBBF24" opacity="0.88"/>
      <!-- Small dots -->
      <circle cx="14"  cy="64"  r="3.5" fill="#FBBF24" opacity="0.72"/>
      <circle cx="202" cy="60"  r="2.5" fill="#FBBF24" opacity="0.65"/>
      <circle cx="40"  cy="18"  r="2"   fill="#FBBF24" opacity="0.7"/>
      <circle cx="174" cy="14"  r="3"   fill="#FBBF24" opacity="0.68"/>

    </svg>
  </div>

  <h1>あなたの想いを、<br>IDで届ける。</h1>
  <p class="desc">KAKULETTERは、住所を明かさずに文通できるサービスです。<br>IDを交換するだけで、実際の手紙を匿名で送り合えます。</p>
  <div class="btns">
    <button class="btn-primary">手紙を送る</button>
    <button class="btn-secondary">無料登録（受取人はこちら）</button>
  </div>
</div>
